spring.application.name=member-preferences-service

# Jackson
spring.jackson.property-naming-strategy=LOWER_CAMEL_CASE
spring.jackson.default-property-inclusion=non_null

# Actuator
management.endpoints.web.exposure.include=health,info,openapi,swagger-ui,configprops,metrics

# Springdoc
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Rate Limiting
preferences.rate-limit.overall.capacity=100
preferences.rate-limit.overall.refill-per-minute=100
preferences.rate-limit.per-member.capacity=20
preferences.rate-limit.per-member.refill-per-minute=20

# Timeout
server.tomcat.connection-timeout=5s
server.tomcat.keep-alive-timeout=30s
server.tomcat.threads.max=200

# Logging
logging.pattern.console=
